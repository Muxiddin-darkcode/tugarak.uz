<!-- Search Filter Script -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.querySelector('input[placeholder*="qidiring"]');
        
        function filterCards() {
            if(!searchInput) return;
            const term = searchInput.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.courses-grid > div, .events-grid > div');
            
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                if (text.includes(term)) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        if (searchInput) {
            searchInput.addEventListener('input', filterCards);
        }

        // Fetch All Clubs
        async function fetchAllClubs() {
            try {
                const res = await fetch('http://localhost:3000/api/clubs');
                const data = await res.json();
                if (data.success) {
                    const grid = document.getElementById('allClubsGrid');
                    grid.innerHTML = data.data.map(c => `
                        <div class="bg-[#1a2234] rounded-xl border border-gray-800 overflow-hidden hover:border-blue-500/50 transition-all duration-300 group flex flex-col">
                            <div class="relative h-40 overflow-hidden">
                                <img src="../${c.imagePath}" alt="${c.title}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500">
                                <div class="absolute top-3 left-3 bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg uppercase">${c.title}</div>
                            </div>
                            <div class="p-4 flex-1 flex flex-col">
                                <h3 class="text-base font-bold text-white mb-3 group-hover:text-blue-400 transition-colors">${c.title}</h3>
                                <div class="space-y-1.5 mb-4 flex-1 text-xs text-gray-400">
                                    <p>${c.paragraph || ''}</p>
                                    <p>${c.description || ''}</p>
                                    ${c.teacher_name ? `<p class="mt-2 text-blue-400 font-medium">👨‍🏫 O'qituvchi: ${c.teacher_name}</p>` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error("Error fetching clubs:", err);
            }
        }
        
        fetchAllClubs();
    });
</script>
