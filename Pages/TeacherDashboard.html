<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'qituvchi Kabineti - Tugarak.uz</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-gray-200 antialiased h-screen flex overflow-hidden selection:bg-blue-500/30">

    <!-- Login Section -->
    <div id="loginSection" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a] p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-500/20 rounded-full blur-3xl"></div>
            
            <div class="relative z-10">
                <div class="flex justify-center mb-6">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center rotate-3 shadow-lg">
                        <svg class="w-8 h-8 text-white -rotate-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path></svg>
                    </div>
                </div>
                <h2 class="text-2xl font-bold text-center text-white mb-2">O'qituvchi Kabineti</h2>
                <p class="text-center text-gray-400 text-sm mb-8">Tizimga kirish uchun loginingizni kiriting</p>

                <div id="loginError" class="hidden text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-lg text-sm mb-4 text-center">Xatolik yuz berdi</div>

                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1.5">Login</label>
                        <input type="text" id="username" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-all" required placeholder="Login...">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1.5">Parol</label>
                        <input type="password" id="password" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-all" required placeholder="вЂўвЂўвЂўвЂўвЂўвЂўвЂўвЂў">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg mt-2">Kirish</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dashboard Layout -->
    <div id="dashboardSection" class="hidden w-full h-full flex">
        <!-- Sidebar -->
        <aside class="w-64 glass border-r border-slate-700/50 flex flex-col hidden md:flex">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path></svg>
                </div>
                <span class="text-xl font-bold text-white tracking-wide">Tugarak</span>
            </div>

            <nav class="flex-1 px-4 py-4 space-y-1">
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600/10 text-blue-400 rounded-xl font-medium transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    Mening Guruhlarim
                </a>
            </nav>

            <div class="p-4 border-t border-slate-700/50">
                <button id="logoutBtn" class="flex items-center gap-3 px-4 py-3 w-full text-red-400 hover:bg-red-500/10 rounded-xl font-medium transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Tizimdan chiqish
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            <header class="h-20 glass border-b border-slate-700/50 flex items-center justify-between px-8 z-10">
                <h1 class="text-2xl font-bold text-white" id="pageTitle">Guruhlarim</h1>
                
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 pl-4 border-l border-slate-700">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 border-2 border-slate-800"></div>
                        <div class="hidden sm:block">
                            <p id="userNameDisplay" class="text-sm font-bold text-white">O'qituvchi</p>
                            <p class="text-xs text-blue-400">Teacher Panel</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 z-0 relative">
                <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-500/5 rounded-full blur-[100px] -z-10 pointer-events-none"></div>

                <!-- Groups Container -->
                <div id="groupsContainer">
                    <div class="glass rounded-2xl border border-slate-700/50 p-8 text-center">
                        <h3 class="text-lg font-medium text-gray-300 mb-2">Hozircha guruhlar yo'q</h3>
                        <p class="text-slate-500 text-sm max-w-md mx-auto">Sizga hali guruhlar biriktirilmagan.</p>
                    </div>
                </div>

                <!-- Lessons Container -->
                <div id="lessonsContainer" class="hidden">
                    <button onclick="showGroups()" class="mb-4 text-blue-400 hover:text-white flex items-center gap-2 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Guruhlarga qaytish
                    </button>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-white" id="currentGroupTitle">Darslar</h2>
                        <button id="addLessonBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl transition-colors text-sm font-medium">+ Dars qo'shish</button>
                    </div>
                    <div id="lessonsList" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Lesson Modal -->
    <div id="lessonModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="glass rounded-2xl p-6 w-full max-w-md relative">
            <h3 class="text-lg font-bold text-white mb-4">Yangi Dars qo'shish</h3>
            <form id="lessonForm" class="space-y-4">
                <input type="hidden" id="l_group_id">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Dars mavzusi</label>
                    <input type="text" id="l_title" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">YouTube Video Linki</label>
                    <input type="url" id="l_video" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500" placeholder="https://youtube.com/watch?v=...">
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="closeModals()" class="flex-1 bg-slate-800 text-white font-medium py-3 rounded-xl hover:bg-slate-700 transition-colors">Bekor qilish</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-medium py-3 rounded-xl hover:bg-blue-500 transition-colors">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assignment Modal -->
    <div id="assignmentModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="glass rounded-2xl p-6 w-full max-w-md relative">
            <h3 class="text-lg font-bold text-white mb-4">Vazifa biriktirish</h3>
            <form id="assignmentForm" class="space-y-4">
                <input type="hidden" id="a_lesson_id">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Vazifa Sarlavhasi</label>
                    <input type="text" id="a_title" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Tavsif / Topshiriq matni</label>
                    <textarea id="a_desc" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-blue-500 h-24" required></textarea>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Qo'shimcha Fayl (Ixtiyoriy)</label>
                    <input type="file" id="a_file" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-medium file:bg-blue-500/10 file:text-blue-400 hover:file:bg-blue-500/20">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Muddat (Deadline)</label>
                    <input type="datetime-local" id="a_deadline" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500" required>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="closeModals()" class="flex-1 bg-slate-800 text-white font-medium py-3 rounded-xl hover:bg-slate-700 transition-colors">Bekor qilish</button>
                    <button type="submit" class="flex-1 bg-purple-600 text-white font-medium py-3 rounded-xl hover:bg-purple-500 transition-colors">Biriktirish</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        
        let currentGroupId = null;

        if (localStorage.getItem('teacherToken') && localStorage.getItem('teacherRole') === 'teacher') {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            document.getElementById('userNameDisplay').textContent = localStorage.getItem('teacherUsername');
            loadGroups();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: document.getElementById('username').value, 
                        password: document.getElementById('password').value 
                    })
                });
                const data = await res.json();
                if (data.success && data.role === 'teacher') {
                    localStorage.setItem('teacherToken', data.token);
                    localStorage.setItem('teacherRole', data.role);
                    localStorage.setItem('teacherUsername', document.getElementById('username').value);
                    window.location.reload();
                } else if (data.success && data.role !== 'teacher') {
                    document.getElementById('loginError').textContent = "Siz o'qituvchi emassiz. O'qituvchi login/parolini kiriting.";
                    document.getElementById('loginError').classList.remove('hidden');
                } else {
                    document.getElementById('loginError').textContent = data.message || "Login yoki parol xato";
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('teacherToken');
            localStorage.removeItem('teacherRole');
            localStorage.removeItem('teacherUsername');
            window.location.reload();
        });

        async function loadGroups() {
            try {
                const res = await fetch('/api/teacher/groups', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('teacherToken')}` }
                });
                const data = await res.json();
                if (data.success && data.data.length > 0) {
                    document.getElementById('groupsContainer').innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">` + 
                        data.data.map(g => `
                            <div class="glass p-6 rounded-2xl border border-slate-700/50 hover:border-blue-500/50 transition-colors group">
                                <div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center mb-4 text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                                </div>
                                <h3 class="text-xl font-bold text-white mb-1">${g.nomi}</h3>
                                <p class="text-blue-400 text-sm mb-6">To'garak: ${g.club_name} вЂў Jadval: ${g.schedule}</p>
                                <button onclick="viewLessons(${g.id}, '${g.nomi}')" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-medium py-3 rounded-xl transition-colors">Darslarni ko'rish</button>
                            </div>
                        `).join('') + `</div>`;
                }
            } catch (err) { console.error(err); }
        }

        function showGroups() {
            document.getElementById('lessonsContainer').classList.add('hidden');
            document.getElementById('groupsContainer').classList.remove('hidden');
            document.getElementById('pageTitle').textContent = "Guruhlarim";
        }

        async function viewLessons(groupId, groupName) {
            currentGroupId = groupId;
            document.getElementById('groupsContainer').classList.add('hidden');
            document.getElementById('lessonsContainer').classList.remove('hidden');
            document.getElementById('pageTitle').textContent = "Guruh Darslari";
            document.getElementById('currentGroupTitle').textContent = `${groupName} guruhining darslari`;
            
            document.getElementById('addLessonBtn').onclick = () => {
                document.getElementById('l_group_id').value = groupId;
                document.getElementById('lessonModal').classList.remove('hidden');
            };

            try {
                const res = await fetch(`/api/groups/${groupId}/lessons`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('teacherToken')}` }
                });
                const data = await res.json();
                if (data.success) {
                    if (data.data.length === 0) {
                        document.getElementById('lessonsList').innerHTML = `<p class="text-gray-400 col-span-full">Hali darslar qo'shilmagan.</p>`;
                        return;
                    }
                    
                    document.getElementById('lessonsList').innerHTML = data.data.map(l => {
                        let embedUrl = "";
                        if(l.video_url && l.video_url.includes('youtube.com/watch?v=')){
                            embedUrl = l.video_url.replace('watch?v=', 'embed/');
                        } else if(l.video_url && l.video_url.includes('youtu.be/')){
                            embedUrl = l.video_url.replace('youtu.be/', 'youtube.com/embed/');
                        }

                        return `
                        <div class="glass rounded-2xl overflow-hidden border border-slate-700/50">
                            ${embedUrl ? `<iframe class="w-full h-48" src="${embedUrl}" frameborder="0" allowfullscreen></iframe>` 
                                       : `<div class="w-full h-48 bg-slate-800 flex items-center justify-center text-gray-500">Video yo'q</div>`}
                            <div class="p-5">
                                <h4 class="text-lg font-bold text-white mb-2">${l.title}</h4>
                                <p class="text-xs text-gray-500 mb-4">Yaratildi: ${new Date(l.created_at).toLocaleString('uz-UZ')}</p>
                                <div class="flex gap-2">
                                    <button onclick="openAssignmentModal(${l.id})" class="flex-1 bg-purple-600/20 hover:bg-purple-600/40 text-purple-400 text-sm font-medium py-2 rounded-lg transition-colors">+ Vazifa</button>
                                </div>
                            </div>
                        </div>
                    `}).join('');
                }
            } catch (err) { console.error(err); }
        }

        function closeModals() {
            document.getElementById('lessonModal').classList.add('hidden');
            document.getElementById('assignmentModal').classList.add('hidden');
            document.getElementById('lessonForm').reset();
            document.getElementById('assignmentForm').reset();
        }

        document.getElementById('lessonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/teacher/lessons', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('teacherToken')}` },
                    body: JSON.stringify({
                        group_id: document.getElementById('l_group_id').value,
                        title: document.getElementById('l_title').value,
                        video_url: document.getElementById('l_video').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    closeModals();
                    viewLessons(currentGroupId, document.getElementById('currentGroupTitle').textContent.replace(' guruhining darslari', ''));
                }
            } catch (err) { console.error(err); }
        });

        function openAssignmentModal(lessonId) {
            document.getElementById('a_lesson_id').value = lessonId;
            document.getElementById('assignmentModal').classList.remove('hidden');
        }

        document.getElementById('assignmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('lesson_id', document.getElementById('a_lesson_id').value);
            formData.append('title', document.getElementById('a_title').value);
            formData.append('description', document.getElementById('a_desc').value);
            formData.append('deadline', document.getElementById('a_deadline').value);
            if(document.getElementById('a_file').files[0]) {
                formData.append('file', document.getElementById('a_file').files[0]);
            }

            try {
                const res = await fetch('/api/teacher/assignments', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('teacherToken')}` },
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    alert("Vazifa muvaffaqiyatli biriktirildi!");
                    closeModals();
                }
            } catch (err) { console.error(err); }
        });
    </script>

    <!-- Dynamic Weather 3D Background Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <script src="../JS/weather-bg.js"></script>

</body>
</html>
